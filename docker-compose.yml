name: fichaqui

services:
  postgres:
    image: postgres:16-alpine
    container_name: fichaqui-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fich_aqui
      POSTGRES_USER: fich_aqui
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - fichaqui_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fich_aqui -d fich_aqui"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fichaqui-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_NAME: FichAqui
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:7Vn8mKp2QxR9sT4uW6yZ1aB3cD5eF7gH9iJ0kL2mN4o=
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: fich_aqui
      DB_USERNAME: fich_aqui
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - .:/var/www/html
    command: >
      sh -c "composer install --no-interaction --prefer-dist &&
             php artisan config:clear --no-interaction &&
             php artisan migrate --force --no-interaction &&
             php artisan db:seed --force --no-interaction || true &&
             php artisan serve --host=0.0.0.0 --port=8000"

volumes:
  fichaqui_postgres_data:
