name: fichaqui

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-fich_aqui}
      POSTGRES_USER: ${DB_USERNAME:-fich_aqui}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5433:5432"
    volumes:
      - fichaqui_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-fich_aqui} -d ${DB_DATABASE:-fich_aqui}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8001}:${APP_PORT:-8001}"
    env_file:
      - .env
    volumes:
      - .:/var/www/html
      - api_vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:${APP_PORT:-8001}
      DB_HOST: postgres
      DB_PORT: 5432
    command: >
      sh -c "composer install --no-interaction --prefer-dist --no-scripts &&
             php artisan package:discover --ansi || true &&
             php artisan config:clear --no-interaction &&
             php artisan migrate --force --no-interaction &&
             php artisan db:seed --force --no-interaction || true &&
             php artisan serve --host=0.0.0.0 --port=$${APP_PORT:-8001} --no-reload"

volumes:
  fichaqui_postgres_data:
  api_vendor:
